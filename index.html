<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hola a Todos</title>

  <!-- Conectamos el CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Hola a todos</h1>

  <button id="btnWsp">Ir a mi WhatsApp</button>
  
  <script>
  const boton = document.getElementById("btnWsp");
  const textoOriginal = boton.innerText;
  
  fetch("http://localhost:3000/usuarios")
    .then(res => res.text())
    .then(data => {
      console.log("Respuesta del servidor:", data);
    });
	
  boton.addEventListener("click", function() {
    alert("Te estoy redirigiendo a WhatsApp 👀");
    window.open("https://wa.me/51931225177", "_blank");
  });
  
  boton.addEventListener("mouseover", function() {
    boton.innerText = "Ahora cambié 😈";
  });

  boton.addEventListener("mouseout", function() {
    boton.innerText = textoOriginal;
  });
  </script>
  <script>
  
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hola a Todos</title>

  <!-- Conectamos el CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Hola a todos</h1>

  <button id="btnWsp">Ir a mi WhatsApp</button>
  
  .map(usuario => `
  <li>
    ${usuario.nombre}
    <button onclick="eliminarUsuario('${usuario._id}')">❌</button>
  </li>
`)
  
  <input type="text" id="nombre" placeholder="Escribe un nombre">
  <button onclick="agregarUsuario()">Agregar</button>
  
  <script>
  const boton = document.getElementById("btnWsp");
  const textoOriginal = boton.innerText;
  
  console.log("Estoy ejecutando el script 👀");
	
  boton.addEventListener("click", function() {
    alert("Te estoy redirigiendo a WhatsApp 👀");
    window.open("https://wa.me/51931225177", "_blank");
  });
  
  boton.addEventListener("mouseover", function() {
    boton.innerText = "Ahora cambié 😈";
  });

  boton.addEventListener("mouseout", function() {
    boton.innerText = textoOriginal;
  });
  
  function cargarUsuarios() {
    fetch("https://backend-holamundo.onrender.com/usuarios")
      .then(res => res.json())
      .then(data => {
        const lista = document.getElementById("resultado");
        lista.innerHTML = data
        .map(usuario => `
          <li>
            ${usuario.nombre}
            <button onclick="eliminarUsuario('${usuario._id}')">❌</button>
          </li>
        `)
        .join("");
    });
  }

  function agregarUsuario() {
    const nombre = document.getElementById("nombre").value;

    fetch("https://backend-holamundo.onrender.com/usuarios", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ nombre: nombre })
    })
    .then(() => {
      cargarUsuarios(); // 🔥 refresca lista
    });
  }
  
  function eliminarUsuario(id) {
  fetch("https://backend-holamundo.onrender.com/usuarios", {
    method: "DELETE"
	})
  .then(() => {
    cargarUsuarios(); // 👈 recarga la lista
	});
  }

  // 👉 carga inicial
  cargarUsuarios();
  </script>
</body>
</html>
